<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ES ↔ ZH Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f4ec;
      --card: #fffefb;
      --ink: #1d2a2a;
      --accent: #0e7a6d;
      --line: #d7d4cc;
      --danger: #8d2727;
      --muted: #4d5d5d;
      --font-ui: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-cjk: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Hiragino Sans GB",
        "Microsoft YaHei", "WenQuanYi Micro Hei", "SimSun", sans-serif;
    }
    :root[data-theme="dark"] {
      --bg: #101615;
      --card: #182120;
      --ink: #e8f0ee;
      --accent: #29b6a4;
      --line: #2f3f3d;
      --danger: #ff8a8a;
      --muted: #afc1bc;
    }
    html, body {
      min-height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      color: var(--ink);
      background-color: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .top-nav {
      width: 100%;
      box-sizing: border-box;
      height: 72px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 0 1rem;
      border-bottom: 1px solid var(--line);
      background: var(--card);
    }
    .brand {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.1px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      justify-self: center;
    }
    .nav-link {
      color: var(--muted);
      text-decoration: none;
      padding: 0.5rem 0.9rem;
      border-radius: 10px;
      border: 1px solid transparent;
      font-size: 1.25rem;
      line-height: 1;
    }
    .nav-link:hover {
      border-color: var(--line);
      color: var(--ink);
    }
    .nav-link.active {
      border-color: color-mix(in srgb, var(--accent) 35%, var(--line));
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 14%, transparent);
    }
    .nav-controls {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    .main-area {
      min-height: calc(100vh - 72px);
      display: grid;
      place-items: center;
      padding: 1.25rem;
      box-sizing: border-box;
    }
    .wrap {
      width: min(920px, 100%);
    }
    .lang-select {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.45rem 0.75rem;
      background: var(--card);
      color: var(--ink);
      font-size: 0.9rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1.4rem;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }
    p.meta {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .theme-btn {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 50%;
      width: 2.2rem;
      height: 2.2rem;
      padding: 0;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .theme-btn:hover {
      background: rgba(255, 255, 255, 0.06);
    }
    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.8rem;
      font-size: 1rem;
      line-height: 1.55;
      font-family: var(--font-cjk);
      box-sizing: border-box;
      margin-bottom: 0.8rem;
      background: transparent;
      color: var(--ink);
    }
    button {
      background: var(--accent);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .error {
      margin-top: 0.8rem;
      color: var(--danger);
      font-weight: 600;
    }
    .result {
      margin-top: 1rem;
      border-top: 1px solid var(--line);
      padding-top: 1rem;
    }
    .result h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
    }
    .result pre {
      margin: 0;
      white-space: pre-wrap;
      font-family: var(--font-cjk);
      font-size: 1rem;
      line-height: 1.6;
    }
    @media (max-width: 700px) {
      .top-nav {
        height: auto;
        grid-template-columns: 1fr;
        justify-items: start;
        gap: 0.6rem;
        padding: 0.75rem;
      }
      .brand {
        font-size: 1.5rem;
      }
      .nav-links {
        width: 100%;
        overflow-x: auto;
        justify-content: flex-start;
        padding-bottom: 0.2rem;
      }
      .nav-controls {
        justify-self: start;
      }
      .main-area {
        min-height: auto;
        padding: 0.75rem;
      }
      .card {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <h1 class="brand">ES-ZH Translator</h1>
    <div class="nav-controls">
        <select id="langSelect" class="lang-select" aria-label="Interface language">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="zh">中文</option>
        </select>
        <button class="theme-btn" id="themeToggle" type="button" aria-label="Toggle theme">🌙</button>
    </div>
  </header>
  <main class="main-area">
    <section class="wrap card">
      <p class="meta" data-i18n="meta_line">
        Auto-detects direction. If <code>{{ output_dir }}</code> exists, it is used; otherwise <code>{{ model }}</code>.
        Running on <code>{{ device }}</code>.
      </p>

      <form method="post">
        <textarea name="text" data-i18n-placeholder="input_placeholder" placeholder="Type Spanish or Chinese text here...">{{ text }}</textarea>
        <button type="submit" data-i18n="translate_btn">Translate</button>
      </form>

      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}

      {% if output %}
      <section class="result">
        <h2 data-i18n="output_title">Output</h2>
        <pre lang="zh-Hans">{{ output }}</pre>
      </section>
      {% endif %}
    </section>
  </main>
  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("themeToggle");
      const langSelect = document.getElementById("langSelect");
      const saved = localStorage.getItem("theme");
      const savedLang = localStorage.getItem("ui_lang") || "en";
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const initial = saved || (prefersDark ? "dark" : "light");
      const i18n = {
        en: {
          page_title: "Spanish ↔ Chinese Translator",
          meta_line: "Auto-detects direction. If {{output_dir}} exists, it is used; otherwise {{model}}. Running on {{device}}.",
          input_placeholder: "Type Spanish or Chinese text here...",
          translate_btn: "Translate",
          output_title: "Output"
        },
        es: {
          page_title: "Traductor Español ↔ Chino",
          meta_line: "Detecta la dirección automáticamente. Si existe {{output_dir}}, se usa; si no, {{model}}. Ejecutándose en {{device}}.",
          input_placeholder: "Escribe texto en español o chino...",
          translate_btn: "Traducir",
          output_title: "Resultado"
        },
        zh: {
          page_title: "西班牙语 ↔ 中文 翻译器",
          meta_line: "自动检测翻译方向。如果 {{output_dir}} 存在则使用它，否则使用 {{model}}。当前设备：{{device}}。",
          input_placeholder: "请输入西班牙语或中文文本...",
          translate_btn: "翻译",
          output_title: "输出"
        }
      };
      const vars = {
        output_dir: "{{ output_dir }}",
        model: "{{ model }}",
        device: "{{ device }}"
      };

      function applyTheme(theme) {
        root.setAttribute("data-theme", theme);
        btn.textContent = theme === "dark" ? "☀️" : "🌙";
        btn.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
      }

      function interpolate(template) {
        return template
          .replace("{{output_dir}}", vars.output_dir)
          .replace("{{model}}", vars.model)
          .replace("{{device}}", vars.device);
      }

      function applyLanguage(lang) {
        const pack = i18n[lang] || i18n.en;
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          const value = pack[key];
          if (value) {
            el.innerHTML = key === "meta_line" ? interpolate(value) : value;
          }
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          const key = el.getAttribute("data-i18n-placeholder");
          const value = pack[key];
          if (value) {
            el.setAttribute("placeholder", value);
          }
        });
      }

      applyTheme(initial);
      langSelect.value = i18n[savedLang] ? savedLang : "en";
      applyLanguage(langSelect.value);

      btn.addEventListener("click", function () {
        const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
        localStorage.setItem("theme", next);
        applyTheme(next);
      });

      langSelect.addEventListener("change", function () {
        const lang = langSelect.value;
        localStorage.setItem("ui_lang", lang);
        applyLanguage(lang);
      });
    })();
  </script>
</body>
</html>
